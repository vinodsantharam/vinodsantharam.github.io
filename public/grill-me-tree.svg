<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 590" width="940" height="590" role="img" aria-labelledby="title desc" font-family="ui-sans-serif, system-ui, -apple-system, &quot;Segoe UI&quot;, Roboto, sans-serif">
  <title id="title">grill-me decision tree</title>
  <desc id="desc">Left: without grill-me the agent jumps straight to its most likely guess and ships the wrong thing. Right: with grill-me the agent traverses a decision tree, challenging you at every node, and reaches a refined plan.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#AFAFC0"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="1" y="1" width="938" height="588" rx="20" fill="#FFFFFF" stroke="#E6E6F0" stroke-width="1.5"/>

  <!-- divider -->
  <line x1="470" y1="74" x2="470" y2="548" stroke="#ECECF3" stroke-width="1.5" stroke-dasharray="3 6"/>

  <!-- column titles -->
  <text x="235" y="46" text-anchor="middle" font-size="19" font-weight="700" fill="#D9583B">Without grill-me</text>
  <text x="235" y="65" text-anchor="middle" font-size="12.5" fill="#9A9AB0">straight to a guess</text>
  <text x="690" y="46" text-anchor="middle" font-size="19" font-weight="700" fill="#6C5CE7">With grill-me</text>
  <text x="690" y="65" text-anchor="middle" font-size="12.5" fill="#9A9AB0">grilled into the right plan</text>

  <!-- ===================== LEFT: straight chain ===================== -->
  <line x1="235" y1="138" x2="235" y2="196" stroke="#AFAFC0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="235" y1="246" x2="235" y2="304" stroke="#AFAFC0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="235" y1="354" x2="235" y2="412" stroke="#AFAFC0" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="85" y="92" width="300" height="44" rx="10" fill="#F4F4F8" stroke="#D7D7E2" stroke-width="1.5"/>
    <text x="235" y="120" text-anchor="middle" font-size="14.5" fill="#27272A">“Implement a login page”</text>
  </g>
  <g>
    <rect x="85" y="200" width="300" height="44" rx="10" fill="#F4F4F8" stroke="#D7D7E2" stroke-width="1.5"/>
    <text x="235" y="228" text-anchor="middle" font-size="14.5" fill="#27272A">Agent takes the most likely path</text>
  </g>
  <g>
    <rect x="85" y="308" width="300" height="44" rx="10" fill="#F4F4F8" stroke="#D7D7E2" stroke-width="1.5"/>
    <text x="235" y="336" text-anchor="middle" font-size="14.5" fill="#27272A">Ships email + password + JWT</text>
  </g>
  <g>
    <rect x="85" y="416" width="300" height="44" rx="10" fill="#FBEBE6" stroke="#E7B2A2" stroke-width="1.5"/>
    <text x="235" y="444" text-anchor="middle" font-size="14.5" font-weight="600" fill="#9A3A22">“Wait — we use OAuth?!”</text>
  </g>
  <text x="235" y="492" text-anchor="middle" font-size="13" font-style="italic" fill="#B0654F">One guess. No questions asked.</text>

  <!-- ===================== RIGHT: decision tree ===================== -->
  <line x1="660" y1="138" x2="660" y2="166" stroke="#AFAFC0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="216" x2="660" y2="244" stroke="#AFAFC0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="294" x2="660" y2="322" stroke="#AFAFC0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="372" x2="660" y2="400" stroke="#AFAFC0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="450" x2="660" y2="474" stroke="#AFAFC0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- branch ticks -->
  <line x1="775" y1="192" x2="786" y2="192" stroke="#CFC6F3" stroke-width="1.5"/>
  <line x1="775" y1="270" x2="786" y2="270" stroke="#CFC6F3" stroke-width="1.5"/>
  <line x1="775" y1="348" x2="786" y2="348" stroke="#CFC6F3" stroke-width="1.5"/>
  <line x1="775" y1="426" x2="786" y2="426" stroke="#CFC6F3" stroke-width="1.5"/>

  <g>
    <rect x="545" y="92" width="230" height="44" rx="10" fill="#F4F4F8" stroke="#D7D7E2" stroke-width="1.5"/>
    <text x="660" y="120" text-anchor="middle" font-size="14" fill="#27272A">“Implement a login page”</text>
  </g>

  <g>
    <rect x="545" y="170" width="230" height="44" rx="10" fill="#F1EFFC" stroke="#CFC6F3" stroke-width="1.5"/>
    <text x="660" y="198" text-anchor="middle" font-size="14" font-weight="600" fill="#4B3FB0">Auth method?</text>
    <text x="790" y="188" font-size="11.5" fill="#7A7A8C">email+pw · OAuth</text>
    <text x="790" y="202" font-size="11.5" fill="#7A7A8C">magic link · SSO</text>
  </g>

  <g>
    <rect x="545" y="248" width="230" height="44" rx="10" fill="#F1EFFC" stroke="#CFC6F3" stroke-width="1.5"/>
    <text x="660" y="276" text-anchor="middle" font-size="14" font-weight="600" fill="#4B3FB0">Session?</text>
    <text x="790" y="274" font-size="11.5" fill="#7A7A8C">JWT · cookie</text>
  </g>

  <g>
    <rect x="545" y="326" width="230" height="44" rx="10" fill="#F1EFFC" stroke="#CFC6F3" stroke-width="1.5"/>
    <text x="660" y="354" text-anchor="middle" font-size="14" font-weight="600" fill="#4B3FB0">Password rules?</text>
    <text x="790" y="352" font-size="11.5" fill="#7A7A8C">length · lockout</text>
  </g>

  <g>
    <rect x="545" y="404" width="230" height="44" rx="10" fill="#F1EFFC" stroke="#CFC6F3" stroke-width="1.5"/>
    <text x="660" y="432" text-anchor="middle" font-size="14" font-weight="600" fill="#4B3FB0">Error UX?</text>
    <text x="790" y="430" font-size="11.5" fill="#7A7A8C">inline · toast</text>
  </g>

  <g>
    <rect x="545" y="478" width="230" height="44" rx="10" fill="#6C5CE7" stroke="#5848d6" stroke-width="1.5"/>
    <text x="660" y="506" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF">Refined plan → implement</text>
  </g>

  <text x="660" y="548" text-anchor="middle" font-size="13" font-style="italic" fill="#6C5CE7">Challenges you at every node.</text>
</svg>
